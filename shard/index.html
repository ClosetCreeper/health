<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shard Status</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --up: #1D9E75;
    --down: #E24B4A;
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --dim: #444;
  }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; display: flex; justify-content: center; padding: 3rem 1.5rem; }
  .container { width: 100%; max-width: 580px; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .back-link { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 6px; }
  .back-link:hover { color: var(--text); }
  .shard-badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; color: var(--muted); }

  .status-hero { display: flex; align-items: center; gap: 20px; margin-bottom: 2rem; }
  .indicator { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
  .dot { width: 18px; height: 18px; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--dim); transition: background 0.5s; }
  .ring { width: 52px; height: 52px; border-radius: 50%; border: 1.5px solid var(--dim); position: absolute; top: 0; left: 0; opacity: 0; }
  body.up .dot { background: var(--up); }
  body.up .ring { border-color: var(--up); animation: ripple 2s ease-out infinite; }
  body.down .dot { background: var(--down); }
  body.down .ring { border-color: var(--down); animation: ripple 1.4s ease-out infinite; }
  @keyframes ripple { 0% { transform: scale(0.4); opacity: 0.7; } 100% { transform: scale(1); opacity: 0; } }

  .hero-label { font-family: 'IBM Plex Mono', monospace; font-size: 30px; font-weight: 500; color: var(--dim); transition: color 0.4s; line-height: 1; }
  body.up .hero-label { color: var(--up); }
  body.down .hero-label { color: var(--down); }
  .hero-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .service-name { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--dim); margin-top: 4px; }

  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 2rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .card-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .card-val { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 500; color: var(--text); }

  .history-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .bars { display: flex; gap: 3px; align-items: flex-end; height: 44px; margin-bottom: 6px; }
  .bar { flex: 1; border-radius: 2px; background: var(--surface); height: 6px; transition: background 0.3s; }
  .bar.up   { background: var(--up);   height: 36px; }
  .bar.down { background: var(--down); height: 28px; }
  .bars-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); font-family: 'IBM Plex Mono', monospace; margin-bottom: 2rem; }

  .incident-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .incident-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 2rem; }
  .incident-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
  .incident-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .incident-dot.down { background: var(--down); }
  .incident-dot.up   { background: var(--up); }
  .incident-time { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .incident-state { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; }
  .incident-state.down { color: var(--down); }
  .incident-state.up   { color: var(--up); }
  .no-incidents { font-size: 13px; color: var(--dim); font-family: 'IBM Plex Mono', monospace; }

  .actions { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
  .btn { font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: background 0.2s, color 0.2s; }
  .btn:hover { background: var(--surface); color: var(--text); }
  .countdown { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--dim); }

  .error-state { text-align: center; padding: 4rem 0; }
  .error-state h2 { font-family: 'IBM Plex Mono', monospace; font-size: 18px; color: var(--muted); margin-bottom: 8px; }
  .error-state p { font-size: 13px; color: var(--dim); }
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <a class="back-link" href="/index.html">← Dashboard</a>
    <span class="shard-badge" id="shard-badge">Shard #—</span>
  </div>

  <div id="main">
    <div class="status-hero">
      <div class="indicator">
        <div class="dot"></div>
        <div class="ring"></div>
      </div>
      <div>
        <div class="hero-label" id="hero-label">Loading…</div>
        <div class="hero-sub" id="hero-sub">Fetching shard status</div>
        <div class="service-name" id="service-name"></div>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-label">Current</div>
        <div class="card-val" id="current-status">—</div>
      </div>
      <div class="card">
        <div class="card-label">Last check</div>
        <div class="card-val" id="last-check">—</div>
      </div>
      <div class="card">
        <div class="card-label">Uptime (30)</div>
        <div class="card-val" id="uptime">—</div>
      </div>
    </div>

    <div class="history-label">Last 30 checks</div>
    <div class="bars" id="bars"></div>
    <div class="bars-meta"><span>oldest</span><span>latest</span></div>

    <div class="incident-label">Recent incidents</div>
    <div class="incident-list" id="incidents"></div>

    <div class="actions">
      <button class="btn" onclick="load()">↻ Refresh</button>
      <span class="countdown" id="countdown">Auto-refreshes every 60s</span>
    </div>
  </div>

</div>
<script>
const SUPABASE_URL = 'https://fjzqcanwxvlcngonozza.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqenFjYW53eHZsY25nb25venphIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTM1MTAwMiwiZXhwIjoyMDkwOTI3MDAyfQ.-L2lj3DCjQFgFJi2wCjKcnS9zV205KsG9y1LN8VfNek';

const SHARD_DEFS = {
  1: { label: 'Elite Server',  service: 'elite-server.service' },
  2: { label: 'Health Server', service: 'health-server.service' },
  3: { label: 'LA Bot',        service: 'la-bot.service' },
  4: { label: 'Midas Bot',     service: 'midas-bot.service' },
  5: { label: 'Midas Dev',     service: 'midas-dev.service' },
  6: { label: 'Murray Bot',    service: 'murray-bot.service' },
};

const params = new URLSearchParams(window.location.search);
const shardId = parseInt(params.get('id'));
const def = SHARD_DEFS[shardId];
let cd = 60;

if (!def) {
  document.getElementById('main').innerHTML = `
    <div class="error-state">
      <h2>Invalid shard</h2>
      <p>Use ?id=1 through ?id=6</p>
    </div>`;
}

document.getElementById('shard-badge').textContent = `Shard #${shardId}`;
document.title = def ? `${def.label} — Shard #${shardId}` : 'Invalid Shard';

function fmt(iso) {
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function fmtFull(iso) {
  return new Date(iso).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function renderBars(rows) {
  const el = document.getElementById('bars');
  el.innerHTML = '';
  const padded = Array(30).fill('unknown');
  rows.forEach((r, i) => { padded[30 - rows.length + i] = r.status; });
  padded.forEach(s => {
    const b = document.createElement('div');
    b.className = 'bar ' + s;
    el.appendChild(b);
  });
}

function renderIncidents(rows) {
  const el = document.getElementById('incidents');
  const incidents = rows.filter(r => r.status === 'down');
  if (!incidents.length) {
    el.innerHTML = '<div class="no-incidents">No incidents in last 30 checks</div>';
    return;
  }
  el.innerHTML = incidents.map(r => `
    <div class="incident-row">
      <div class="incident-dot down"></div>
      <div class="incident-time">${fmtFull(r.checked_at)}</div>
      <div class="incident-state down">Unreachable</div>
    </div>`).join('');
}

async function load() {
  if (!def) return;
  cd = 60;
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/shard_status?shard_id=eq.${shardId}&select=status,checked_at,service&order=checked_at.desc&limit=30`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const rows = await res.json();
    if (!rows.length) {
      document.getElementById('hero-sub').textContent = 'No data yet — waiting for first check';
      return;
    }

    const latest = rows[0];
    const isUp = latest.status === 'up';

    document.body.className = isUp ? 'up' : 'down';
    document.getElementById('hero-label').textContent = def.label;
    document.getElementById('hero-sub').textContent = isUp ? 'Service is active' : 'Service is inactive';
    document.getElementById('service-name').textContent = latest.service || def.service;
    document.getElementById('current-status').textContent = isUp ? 'active' : 'inactive';
    document.getElementById('last-check').textContent = fmt(latest.checked_at);

    const upCount = rows.filter(r => r.status === 'up').length;
    document.getElementById('uptime').textContent = Math.round((upCount / rows.length) * 100) + '%';

    renderBars([...rows].reverse());
    renderIncidents(rows);
  } catch(e) {
    document.getElementById('hero-sub').textContent = 'Could not reach Supabase';
  }
}

if (def) {
  load();
  setInterval(() => {
    cd--;
    if (cd <= 0) { load(); cd = 60; }
    document.getElementById('countdown').textContent = 'Next refresh in ' + cd + 's';
  }, 1000);
}
</script>
</body>
</html>
